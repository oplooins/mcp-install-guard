name: check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check
        run: npm run check
      - name: Scan sample tools
        run: node ./mcp-install-guard-cli.mjs --file ./sample-tools-list.json
      - name: Export markdown report
        run: node ./mcp-install-guard-cli.mjs --file ./sample-tools-list.json --out-md ./example-report.md
