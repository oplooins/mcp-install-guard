<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MCP Debug Console</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: #fffdf8;
      --panel-strong: #f8f3e8;
      --ink: #171512;
      --muted: #70695d;
      --line: #ded5c6;
      --accent: #0f766e;
      --accent-dark: #0b5f59;
      --amber: #b7791f;
      --red: #b42318;
      --blue: #1d4ed8;
      --green-soft: #e5f6f2;
      --amber-soft: #fff3d7;
      --red-soft: #fde8e5;
      --shadow: 0 16px 40px rgba(31, 27, 21, 0.09);
      --radius: 8px;
      font-family: "Aptos", "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.10), transparent 34%),
        radial-gradient(circle at 85% 12%, rgba(183, 121, 31, 0.14), transparent 28%),
        var(--bg);
      min-height: 100vh;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 7px;
      min-height: 34px;
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: #b7aa98;
      background: #fbf7ef;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    button.primary:hover {
      background: var(--accent-dark);
    }

    button.icon {
      width: 34px;
      padding: 0;
      display: inline-grid;
      place-items: center;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 64px 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 22px;
      border-bottom: 1px solid rgba(118, 105, 88, 0.26);
      background: rgba(255, 253, 248, 0.76);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #14213d;
      color: white;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand p {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: max-content;
      color: var(--muted);
      font-size: 13px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 0 4px rgba(183, 121, 31, 0.13);
    }

    .dot.online {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.13);
    }

    .workspace {
      display: grid;
      grid-template-columns: 280px minmax(360px, 1fr) 390px;
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }

    .panel {
      background: rgba(255, 253, 248, 0.88);
      border: 1px solid rgba(118, 105, 88, 0.26);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 0;
      overflow: hidden;
    }

    .panel-head {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(248, 243, 232, 0.82);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 14px;
      line-height: 1.2;
    }

    .panel-body {
      padding: 14px;
    }

    .left, .center, .right {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .connection {
      display: grid;
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fffefa;
      color: var(--ink);
      min-height: 36px;
      padding: 8px 10px;
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.13);
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tools-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      overflow: auto;
      max-height: calc(100vh - 270px);
      padding-right: 2px;
    }

    .tool-item {
      text-align: left;
      padding: 10px;
      min-height: 72px;
      display: grid;
      gap: 5px;
      border-radius: 7px;
      background: #fffefa;
    }

    .tool-item.active {
      border-color: var(--accent);
      background: var(--green-soft);
    }

    .tool-item strong {
      font-size: 13px;
    }

    .tool-item span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.58);
    }

    .editor-layout {
      display: grid;
      grid-template-rows: auto minmax(210px, 1fr) auto;
      gap: 12px;
      height: 100%;
    }

    .tool-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .tool-title h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .tool-title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      max-width: 72ch;
    }

    .schema {
      border: 1px solid var(--line);
      background: var(--panel-strong);
      border-radius: 7px;
      padding: 10px;
      max-height: 155px;
      overflow: auto;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    textarea {
      min-height: 220px;
      resize: vertical;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 13px;
      line-height: 1.45;
    }

    .runbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .runbar .hint {
      color: var(--muted);
      font-size: 12px;
      min-width: 0;
    }

    .result-tabs {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fffefa;
    }

    .result-tabs button {
      border: 0;
      border-radius: 0;
      min-height: 32px;
      font-size: 12px;
    }

    .result-tabs button.active {
      background: #14213d;
      color: white;
    }

    .result-box {
      min-height: 250px;
      max-height: calc(100vh - 220px);
      overflow: auto;
      padding: 13px;
      background: #111827;
      color: #f7f7f1;
      border-radius: 7px;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.48;
      white-space: pre-wrap;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px;
      background: #fffefa;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .metric strong {
      display: block;
      margin-top: 3px;
      font-size: 16px;
    }

    .history {
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 410px);
      min-height: 130px;
      overflow: auto;
      padding-right: 2px;
    }

    .history-row {
      display: grid;
      gap: 5px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px;
      background: #fffefa;
      cursor: pointer;
    }

    .history-row:hover {
      border-color: #b7aa98;
      background: #fbf7ef;
    }

    .history-row .line {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }

    .pill {
      min-width: 58px;
      text-align: center;
      height: 22px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid var(--line);
    }

    .pill.ok {
      background: var(--green-soft);
      color: var(--accent-dark);
      border-color: #b7e5da;
    }

    .pill.warn {
      background: var(--amber-soft);
      color: #875713;
      border-color: #f0d293;
    }

    .pill.err {
      background: var(--red-soft);
      color: var(--red);
      border-color: #f4b5ad;
    }

    .empty {
      min-height: 118px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 7px;
      padding: 18px;
      font-size: 13px;
      line-height: 1.5;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #14213d;
      color: white;
      padding: 11px 13px;
      border-radius: 8px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      transition: 180ms ease;
      pointer-events: none;
      font-size: 13px;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1100px) {
      .workspace {
        grid-template-columns: 260px 1fr;
        grid-template-rows: minmax(520px, 1fr) auto;
      }

      .right {
        grid-column: 1 / -1;
      }

      .result-box {
        max-height: 360px;
      }

      .history {
        max-height: 240px;
      }
    }

    @media (max-width: 760px) {
      .topbar {
        height: auto;
        padding: 12px;
        align-items: flex-start;
        flex-direction: column;
      }

      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        padding: 10px;
      }

      .tools-list, .history {
        max-height: 260px;
      }

      .tool-title {
        flex-direction: column;
      }

      .runbar {
        align-items: stretch;
        flex-direction: column;
      }

      .metric-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">M</div>
        <div>
          <h1>MCP Debug Console</h1>
          <p>本地调试台原型 · 连接、调用、排错、复用参数</p>
        </div>
      </div>
      <div class="status" aria-live="polite">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">未连接</span>
      </div>
    </header>

    <main class="workspace">
      <section class="panel left">
        <div class="panel-head">
          <h2>Server</h2>
          <button class="icon" id="resetBtn" title="重置演示数据">↺</button>
        </div>
        <div class="panel-body">
          <div class="connection">
            <label>
              连接方式
              <select id="transport">
                <option>Streamable HTTP</option>
                <option>Local stdio</option>
                <option>SSE</option>
              </select>
            </label>
            <label>
              Server 地址
              <input id="serverUrl" value="http://localhost:7331/mcp" spellcheck="false">
            </label>
            <div class="actions">
              <button class="primary" id="connectBtn">连接</button>
              <button id="disconnectBtn">断开</button>
            </div>
          </div>

          <div class="tools-list" id="toolsList"></div>
        </div>
      </section>

      <section class="panel center">
        <div class="panel-head">
          <h2>Tool 调用</h2>
          <div class="tag-row">
            <span class="tag" id="selectedTag">未选择</span>
          </div>
        </div>
        <div class="panel-body editor-layout">
          <div class="tool-title">
            <div>
              <h2 id="toolName">选择一个 tool</h2>
              <p id="toolDesc">连接成功后，从左侧选择 tool，查看参数结构并手动发起调用。</p>
            </div>
            <button id="fillExampleBtn">填入示例</button>
          </div>

          <div>
            <div class="schema" id="schemaBox">暂无 schema</div>
            <label style="margin-top: 12px;">
              参数 JSON
              <textarea id="paramsInput" spellcheck="false">{
  "query": "invoice status",
  "limit": 5
}</textarea>
            </label>
          </div>

          <div class="runbar">
            <span class="hint" id="runHint">第一版先用 JSON 输入，后续再做自动表单。</span>
            <button class="primary" id="runBtn">运行 tool</button>
          </div>
        </div>
      </section>

      <section class="panel right">
        <div class="panel-head">
          <h2>结果与历史</h2>
          <div class="result-tabs">
            <button class="active" data-tab="result">结果</button>
            <button data-tab="request">请求</button>
            <button data-tab="error">错误</button>
          </div>
        </div>
        <div class="panel-body">
          <div class="metric-grid">
            <div class="metric">
              <span>状态</span>
              <strong id="metricStatus">idle</strong>
            </div>
            <div class="metric">
              <span>耗时</span>
              <strong id="metricTime">0 ms</strong>
            </div>
            <div class="metric">
              <span>调用数</span>
              <strong id="metricCalls">0</strong>
            </div>
          </div>

          <pre class="result-box" id="resultBox">等待调用结果...</pre>

          <h2 style="font-size: 14px; margin: 16px 0 9px;">调用历史</h2>
          <div class="history" id="historyList"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast">已更新</div>

  <script>
    const tools = [
      {
        name: "search_docs",
        label: "搜索文档",
        description: "按关键词检索内部知识库，返回标题、摘要和来源链接。",
        tags: ["read", "docs"],
        schema: {
          type: "object",
          required: ["query"],
          properties: {
            query: { type: "string", description: "搜索关键词" },
            limit: { type: "number", default: 5, description: "返回数量" }
          }
        },
        example: { query: "invoice status", limit: 5 }
      },
      {
        name: "create_ticket",
        label: "创建工单",
        description: "把用户问题写入支持系统，并返回工单编号。",
        tags: ["write", "support"],
        schema: {
          type: "object",
          required: ["title", "priority"],
          properties: {
            title: { type: "string", description: "工单标题" },
            priority: { type: "string", enum: ["low", "medium", "high"] },
            assignee: { type: "string", description: "负责人邮箱" }
          }
        },
        example: { title: "Customer cannot access billing page", priority: "medium", assignee: "ops@example.com" }
      },
      {
        name: "query_database",
        label: "查询数据库",
        description: "执行只读 SQL 查询，适合排查数据状态。",
        tags: ["read", "sql"],
        schema: {
          type: "object",
          required: ["sql"],
          properties: {
            sql: { type: "string", description: "只读 SQL" },
            timeoutMs: { type: "number", default: 3000 }
          }
        },
        example: { sql: "select id, email, created_at from users order by created_at desc limit 5", timeoutMs: 3000 }
      },
      {
        name: "send_slack_message",
        label: "发送消息",
        description: "向指定频道发送一条消息，可用于验证写入类 tool 的权限。",
        tags: ["write", "message"],
        schema: {
          type: "object",
          required: ["channel", "text"],
          properties: {
            channel: { type: "string", description: "频道名或 ID" },
            text: { type: "string", description: "消息内容" }
          }
        },
        example: { channel: "#support", text: "MCP tool test from debug console" }
      }
    ];

    const state = {
      connected: false,
      selected: tools[0],
      resultTab: "result",
      lastRun: null,
      history: JSON.parse(localStorage.getItem("mcpDebugHistory") || "[]")
    };

    const els = {
      statusDot: document.getElementById("statusDot"),
      statusText: document.getElementById("statusText"),
      serverUrl: document.getElementById("serverUrl"),
      transport: document.getElementById("transport"),
      connectBtn: document.getElementById("connectBtn"),
      disconnectBtn: document.getElementById("disconnectBtn"),
      resetBtn: document.getElementById("resetBtn"),
      toolsList: document.getElementById("toolsList"),
      toolName: document.getElementById("toolName"),
      toolDesc: document.getElementById("toolDesc"),
      selectedTag: document.getElementById("selectedTag"),
      schemaBox: document.getElementById("schemaBox"),
      paramsInput: document.getElementById("paramsInput"),
      fillExampleBtn: document.getElementById("fillExampleBtn"),
      runBtn: document.getElementById("runBtn"),
      resultBox: document.getElementById("resultBox"),
      metricStatus: document.getElementById("metricStatus"),
      metricTime: document.getElementById("metricTime"),
      metricCalls: document.getElementById("metricCalls"),
      historyList: document.getElementById("historyList"),
      toast: document.getElementById("toast")
    };

    function pretty(value) {
      return JSON.stringify(value, null, 2);
    }

    function showToast(text) {
      els.toast.textContent = text;
      els.toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => els.toast.classList.remove("show"), 1300);
    }

    function renderConnection() {
      els.statusDot.classList.toggle("online", state.connected);
      els.statusText.textContent = state.connected
        ? `已连接 · ${els.transport.value} · ${els.serverUrl.value}`
        : "未连接";
    }

    function renderTools() {
      els.toolsList.innerHTML = "";
      if (!state.connected) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "点击连接后显示 server 暴露的 tools。";
        els.toolsList.appendChild(empty);
        return;
      }

      tools.forEach((tool) => {
        const button = document.createElement("button");
        button.className = `tool-item ${state.selected.name === tool.name ? "active" : ""}`;
        button.innerHTML = `
          <strong>${tool.label} <span style="color: var(--muted); font-weight: 500;">${tool.name}</span></strong>
          <span>${tool.description}</span>
          <span class="tag-row">${tool.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}</span>
        `;
        button.addEventListener("click", () => {
          state.selected = tool;
          renderToolDetail();
          renderTools();
        });
        els.toolsList.appendChild(button);
      });
    }

    function renderToolDetail() {
      const tool = state.selected;
      els.toolName.textContent = tool ? `${tool.label} · ${tool.name}` : "选择一个 tool";
      els.toolDesc.textContent = tool ? tool.description : "连接成功后，从左侧选择 tool。";
      els.selectedTag.textContent = tool ? tool.tags.join(" / ") : "未选择";
      els.schemaBox.textContent = tool ? pretty(tool.schema) : "暂无 schema";
      if (tool) {
        els.paramsInput.value = pretty(tool.example);
      }
    }

    function currentPayload() {
      return {
        jsonrpc: "2.0",
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        method: "tools/call",
        params: {
          name: state.selected.name,
          arguments: JSON.parse(els.paramsInput.value)
        }
      };
    }

    function mockResponse(tool, args) {
      if (tool.name === "query_database" && /drop|delete|update|insert/i.test(args.sql || "")) {
        const error = new Error("只读调试模式拒绝执行写入 SQL");
        error.code = "READ_ONLY_VIOLATION";
        throw error;
      }

      const base = {
        tool: tool.name,
        ok: true,
        content: []
      };

      if (tool.name === "search_docs") {
        base.content = [
          { title: "Billing workflow", score: 0.91, source: "/docs/billing/workflow" },
          { title: "Invoice status mapping", score: 0.86, source: "/docs/billing/invoices" }
        ];
      }

      if (tool.name === "create_ticket") {
        base.content = [{ ticketId: `SUP-${Math.floor(1000 + Math.random() * 9000)}`, priority: args.priority, assignee: args.assignee || "unassigned" }];
      }

      if (tool.name === "query_database") {
        base.content = [
          { id: "usr_1024", email: "ada@example.com", created_at: "2026-05-18T09:22:41Z" },
          { id: "usr_1025", email: "lin@example.com", created_at: "2026-05-18T10:04:12Z" }
        ];
      }

      if (tool.name === "send_slack_message") {
        base.content = [{ channel: args.channel, sent: true, messageTs: `${Date.now()}.000100` }];
      }

      return base;
    }

    async function runTool() {
      if (!state.connected) {
        showToast("请先连接 server");
        return;
      }

      const started = performance.now();
      els.metricStatus.textContent = "running";
      els.resultBox.textContent = "调用中...";
      await new Promise(resolve => setTimeout(resolve, 360 + Math.random() * 360));

      let request;
      let entry;
      try {
        request = currentPayload();
        const response = mockResponse(state.selected, request.params.arguments);
        const elapsed = Math.round(performance.now() - started);
        entry = {
          id: Date.now(),
          status: "ok",
          tool: state.selected.name,
          label: state.selected.label,
          elapsed,
          request,
          response,
          error: null,
          createdAt: new Date().toLocaleTimeString()
        };
      } catch (error) {
        const elapsed = Math.round(performance.now() - started);
        entry = {
          id: Date.now(),
          status: "err",
          tool: state.selected.name,
          label: state.selected.label,
          elapsed,
          request: request || { parseError: els.paramsInput.value },
          response: null,
          error: {
            name: error.name,
            code: error.code || "INVALID_REQUEST",
            message: error.message
          },
          createdAt: new Date().toLocaleTimeString()
        };
      }

      state.lastRun = entry;
      state.history = [entry, ...state.history].slice(0, 12);
      localStorage.setItem("mcpDebugHistory", JSON.stringify(state.history));
      renderResult();
      renderHistory();
      showToast(entry.status === "ok" ? "调用成功" : "调用失败");
    }

    function renderResult() {
      const entry = state.lastRun;
      els.metricCalls.textContent = String(state.history.length);

      if (!entry) {
        els.metricStatus.textContent = "idle";
        els.metricTime.textContent = "0 ms";
        els.resultBox.textContent = "等待调用结果...";
        return;
      }

      els.metricStatus.textContent = entry.status === "ok" ? "success" : "error";
      els.metricTime.textContent = `${entry.elapsed} ms`;

      if (state.resultTab === "result") {
        els.resultBox.textContent = entry.response ? pretty(entry.response) : "本次调用没有成功结果。";
      }

      if (state.resultTab === "request") {
        els.resultBox.textContent = pretty(entry.request);
      }

      if (state.resultTab === "error") {
        els.resultBox.textContent = entry.error ? pretty(entry.error) : "没有错误。";
      }
    }

    function renderHistory() {
      els.historyList.innerHTML = "";
      if (!state.history.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "运行 tool 后，这里会保留最近 12 次调用。";
        els.historyList.appendChild(empty);
        return;
      }

      state.history.forEach((item) => {
        const row = document.createElement("div");
        row.className = "history-row";
        row.innerHTML = `
          <div class="line">
            <strong>${item.label}</strong>
            <span class="pill ${item.status === "ok" ? "ok" : "err"}">${item.status}</span>
          </div>
          <div class="line" style="color: var(--muted);">
            <span>${item.tool}</span>
            <span>${item.elapsed} ms · ${item.createdAt}</span>
          </div>
        `;
        row.addEventListener("click", () => {
          state.lastRun = item;
          state.resultTab = "result";
          syncTabs();
          renderResult();
        });
        els.historyList.appendChild(row);
      });
    }

    function syncTabs() {
      document.querySelectorAll(".result-tabs button").forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === state.resultTab);
      });
    }

    els.connectBtn.addEventListener("click", () => {
      state.connected = true;
      renderConnection();
      renderTools();
      renderToolDetail();
      showToast("已连接演示 server");
    });

    els.disconnectBtn.addEventListener("click", () => {
      state.connected = false;
      renderConnection();
      renderTools();
      showToast("已断开");
    });

    els.resetBtn.addEventListener("click", () => {
      state.history = [];
      state.lastRun = null;
      localStorage.removeItem("mcpDebugHistory");
      renderHistory();
      renderResult();
      showToast("历史已清空");
    });

    els.fillExampleBtn.addEventListener("click", () => {
      if (state.selected) {
        els.paramsInput.value = pretty(state.selected.example);
        showToast("已填入示例参数");
      }
    });

    els.runBtn.addEventListener("click", runTool);

    document.querySelectorAll(".result-tabs button").forEach((button) => {
      button.addEventListener("click", () => {
        state.resultTab = button.dataset.tab;
        syncTabs();
        renderResult();
      });
    });

    renderConnection();
    renderTools();
    renderToolDetail();
    renderHistory();
    renderResult();
  </script>
</body>
</html>
