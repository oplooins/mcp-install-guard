<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MCP 手动调试台</title>
  <style>
    :root {
      --bg: #eef2ee;
      --surface: #fffdf7;
      --surface-2: #f7f3e8;
      --ink: #181713;
      --muted: #686357;
      --line: #d8d1c2;
      --accent: #0f766e;
      --accent-2: #164e63;
      --danger: #b42318;
      --warn: #a16207;
      --ok-bg: #def7ec;
      --bad-bg: #fee4e2;
      --warn-bg: #fef3c7;
      --shadow: 0 16px 38px rgba(22, 30, 24, .09);
      font-family: "Aptos", "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(140deg, rgba(15, 118, 110, .13), transparent 38%),
        linear-gradient(35deg, rgba(164, 98, 7, .12), transparent 42%),
        var(--bg);
    }

    button, input, select, textarea { font: inherit; }

    button {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      min-height: 34px;
      border-radius: 7px;
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover { background: #faf6ed; border-color: #b7aa99; }
    button.primary { background: var(--accent); border-color: var(--accent); color: white; }
    button.primary:hover { background: #0b5f59; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 62px 1fr;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      border-bottom: 1px solid rgba(80, 72, 58, .22);
      background: rgba(255, 253, 247, .78);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--accent-2);
      color: white;
      font-weight: 800;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 17px; }
    .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--warn);
      box-shadow: 0 0 0 4px rgba(161, 98, 7, .14);
    }

    .dot.on {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, .14);
    }

    main {
      display: grid;
      grid-template-columns: 292px minmax(390px, 1fr) 410px;
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }

    .panel {
      background: rgba(255, 253, 247, .9);
      border: 1px solid rgba(80, 72, 58, .24);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 0;
    }

    .panel-head {
      height: 46px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      background: rgba(247, 243, 232, .86);
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 { font-size: 14px; }
    .panel-body { padding: 14px; }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fffefa;
      color: var(--ink);
      border-radius: 7px;
      min-height: 36px;
      padding: 8px 10px;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .13);
    }

    textarea {
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 13px;
      line-height: 1.48;
      resize: vertical;
    }

    .stack { display: grid; gap: 10px; }
    .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .tools {
      display: grid;
      gap: 8px;
      margin-top: 14px;
      max-height: calc(100vh - 280px);
      overflow: auto;
      padding-right: 2px;
    }

    .tool {
      text-align: left;
      display: grid;
      gap: 5px;
      min-height: 74px;
      padding: 10px;
      background: #fffefa;
    }

    .tool.active {
      background: #e1f4ef;
      border-color: var(--accent);
    }

    .tool strong { font-size: 13px; }
    .tool span { color: var(--muted); font-size: 12px; line-height: 1.35; }

    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      height: 22px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 7px;
      font-size: 11px;
      color: var(--muted);
      background: rgba(255, 255, 255, .6);
    }

    .center-body {
      height: calc(100vh - 122px);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
    }

    .tool-title {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    .tool-title h2 { font-size: 20px; line-height: 1.2; }
    .tool-title p { margin-top: 5px; color: var(--muted); font-size: 13px; line-height: 1.42; }

    .schema {
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: 7px;
      padding: 10px;
      max-height: 148px;
      overflow: auto;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    #argsInput { min-height: 220px; height: 100%; }

    .runbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .hint { color: var(--muted); font-size: 12px; line-height: 1.4; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fffefa;
      padding: 9px;
    }

    .metric span { display: block; color: var(--muted); font-size: 11px; }
    .metric strong { display: block; margin-top: 3px; font-size: 15px; }

    .tabs {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fffefa;
    }

    .tabs button {
      border: 0;
      border-radius: 0;
      min-height: 31px;
      font-size: 12px;
    }

    .tabs button.active {
      background: var(--accent-2);
      color: white;
    }

    pre.output {
      min-height: 252px;
      max-height: calc(100vh - 286px);
      margin: 0;
      overflow: auto;
      border-radius: 7px;
      padding: 13px;
      background: #101820;
      color: #f8f5eb;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .history {
      margin-top: 12px;
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
      padding-right: 2px;
    }

    .history-row {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fffefa;
      padding: 9px;
      cursor: pointer;
      display: grid;
      gap: 5px;
    }

    .history-row:hover { background: #faf6ed; border-color: #b7aa99; }

    .auto-test {
      margin-top: 16px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .auto-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .auto-head h2 {
      font-size: 14px;
      margin: 0;
    }

    .auto-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .auto-card {
      border: 1px solid var(--line);
      background: #fffefa;
      border-radius: 7px;
      padding: 8px;
    }

    .auto-card span {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .auto-card strong {
      display: block;
      margin-top: 3px;
      font-size: 15px;
    }

    .auto-results {
      display: grid;
      gap: 8px;
      max-height: 250px;
      overflow: auto;
      padding-right: 2px;
    }

    .line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .pill {
      height: 22px;
      min-width: 62px;
      padding: 0 7px;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      font-size: 11px;
      border: 1px solid var(--line);
    }

    .pill.ok { background: var(--ok-bg); color: #067647; border-color: #afe3cf; }
    .pill.err { background: var(--bad-bg); color: var(--danger); border-color: #f7b5ae; }
    .pill.warn { background: var(--warn-bg); color: #854d0e; border-color: #e7c66b; }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 7px;
      color: var(--muted);
      min-height: 110px;
      padding: 18px;
      display: grid;
      place-items: center;
      text-align: center;
      line-height: 1.45;
      font-size: 13px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      opacity: 0;
      transform: translateY(8px);
      transition: 180ms ease;
      pointer-events: none;
      color: white;
      background: var(--accent-2);
      border-radius: 8px;
      padding: 10px 13px;
      box-shadow: var(--shadow);
      font-size: 13px;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 1120px) {
      main {
        grid-template-columns: 280px 1fr;
        grid-template-rows: minmax(610px, 1fr) auto;
      }
      .right { grid-column: 1 / -1; }
      pre.output { max-height: 360px; }
    }

    @media (max-width: 760px) {
      header {
        height: auto;
        padding: 12px;
        align-items: flex-start;
        flex-direction: column;
      }
      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        padding: 10px;
      }
      .center-body { height: auto; }
      .tool-title, .runbar { flex-direction: column; align-items: stretch; }
      .metrics, .auto-summary { grid-template-columns: 1fr; }
      .tools { max-height: 270px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <div class="logo">M</div>
        <div>
          <h1>MCP 手动调试台</h1>
          <p class="sub">选择 tool，手动填写参数，运行一次调用并查看结果</p>
        </div>
      </div>
      <div class="status"><span class="dot" id="dot"></span><span id="status">未连接</span></div>
    </header>

    <main>
      <section class="panel left">
        <div class="panel-head">
          <h2>连接</h2>
          <button id="clearBtn" title="清空历史">清空</button>
        </div>
        <div class="panel-body">
          <div class="stack">
            <label>传输方式
              <select id="transport">
                <option>Streamable HTTP</option>
                <option>Local stdio</option>
                <option>SSE</option>
              </select>
            </label>
            <label>MCP Server
              <input id="server" value="http://localhost:7331/mcp" spellcheck="false">
            </label>
            <div class="actions">
              <button class="primary" id="connectBtn">连接</button>
              <button id="disconnectBtn">断开</button>
            </div>
          </div>
          <div class="tools" id="tools"></div>
        </div>
      </section>

      <section class="panel center">
        <div class="panel-head">
          <h2>手动调用</h2>
          <span class="chip" id="toolTag">未选择</span>
        </div>
        <div class="panel-body center-body">
          <div class="tool-title">
            <div>
              <h2 id="toolName">等待连接</h2>
              <p id="toolDesc">连接后选择一个 MCP tool，查看它需要的参数，再手动运行。</p>
            </div>
            <button id="exampleBtn">填示例参数</button>
          </div>
          <pre class="schema" id="schema">暂无参数结构</pre>
          <label>参数 JSON
            <textarea id="argsInput" spellcheck="false">{}</textarea>
          </label>
          <div class="runbar">
            <span class="hint">判断结果时看三处：状态是否成功、返回内容是否符合预期、错误详情是否为空。</span>
            <button class="primary" id="runBtn">运行 tool</button>
          </div>
        </div>
      </section>

      <section class="panel right">
        <div class="panel-head">
          <h2>结果</h2>
          <div class="tabs">
            <button class="active" data-tab="response">返回</button>
            <button data-tab="request">请求</button>
            <button data-tab="error">错误</button>
          </div>
        </div>
        <div class="panel-body">
          <div class="metrics">
            <div class="metric"><span>状态</span><strong id="mStatus">idle</strong></div>
            <div class="metric"><span>耗时</span><strong id="mTime">0 ms</strong></div>
            <div class="metric"><span>次数</span><strong id="mCount">0</strong></div>
          </div>
          <pre class="output" id="output">还没有运行。</pre>
          <h2 style="font-size: 14px; margin: 14px 0 8px;">历史记录</h2>
          <div class="history" id="history"></div>
          <section class="auto-test">
            <div class="auto-head">
              <h2>自动测试</h2>
              <button class="primary" id="autoRunBtn">测试全部 tools</button>
            </div>
            <div class="auto-summary">
              <div class="auto-card"><span>通过率</span><strong id="autoPassRate">0%</strong></div>
              <div class="auto-card"><span>通过 / 总数</span><strong id="autoCount">0 / 0</strong></div>
              <div class="auto-card"><span>平均耗时</span><strong id="autoAvg">0 ms</strong></div>
            </div>
            <div class="auto-results" id="autoResults">
              <div class="empty">点击测试全部 tools 后，这里会生成自动测试报告。</div>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast">完成</div>

  <script>
    const sampleTools = [
      {
        name: "search_docs",
        title: "搜索文档",
        desc: "根据关键词搜索知识库，返回命中的文档标题和来源。",
        tags: ["read", "docs"],
        schema: {
          type: "object",
          required: ["query"],
          properties: {
            query: { type: "string", description: "搜索关键词" },
            limit: { type: "number", default: 5, description: "返回数量" }
          }
        },
        example: { query: "invoice status", limit: 5 }
      },
      {
        name: "query_database",
        title: "查询数据库",
        desc: "运行只读 SQL，用来检查业务数据状态。",
        tags: ["read", "sql"],
        schema: {
          type: "object",
          required: ["sql"],
          properties: {
            sql: { type: "string", description: "只读 SQL" },
            timeoutMs: { type: "number", default: 3000 }
          }
        },
        example: { sql: "select id, email from users limit 5", timeoutMs: 3000 }
      },
      {
        name: "create_ticket",
        title: "创建工单",
        desc: "把一条用户问题写入支持系统，返回工单编号。",
        tags: ["write", "support"],
        schema: {
          type: "object",
          required: ["title", "priority"],
          properties: {
            title: { type: "string", description: "工单标题" },
            priority: { type: "string", enum: ["low", "medium", "high"] },
            assignee: { type: "string", description: "负责人邮箱" }
          }
        },
        example: { title: "Cannot access billing page", priority: "medium", assignee: "ops@example.com" }
      }
    ];

    const state = {
      connected: false,
      selected: sampleTools[0],
      tab: "response",
      last: null,
      history: JSON.parse(localStorage.getItem("mcpManualHistory") || "[]"),
      autoResults: JSON.parse(localStorage.getItem("mcpAutoResults") || "[]")
    };

    const $ = (id) => document.getElementById(id);
    const pretty = (value) => JSON.stringify(value, null, 2);

    function toast(text) {
      $("toast").textContent = text;
      $("toast").classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => $("toast").classList.remove("show"), 1300);
    }

    function validateArgs(tool, args) {
      const required = tool.schema.required || [];
      for (const key of required) {
        if (!(key in args) || args[key] === "") {
          return `缺少必填参数: ${key}`;
        }
      }

      for (const [key, config] of Object.entries(tool.schema.properties || {})) {
        if (!(key in args)) continue;
        if (config.type === "number" && typeof args[key] !== "number") return `${key} 应该是 number`;
        if (config.type === "string" && typeof args[key] !== "string") return `${key} 应该是 string`;
        if (config.enum && !config.enum.includes(args[key])) return `${key} 只能是: ${config.enum.join(", ")}`;
      }

      if (tool.name === "query_database" && /drop|delete|update|insert|alter/i.test(args.sql || "")) {
        return "演示版只允许只读 SQL";
      }

      return "";
    }

    function fakeCall(tool, args) {
      if (tool.name === "search_docs") {
        return {
          ok: true,
          tool: tool.name,
          content: [
            { title: "Invoice status mapping", score: 0.91, source: "/docs/billing/invoices" },
            { title: "Billing workflow", score: 0.86, source: "/docs/billing/workflow" }
          ]
        };
      }

      if (tool.name === "query_database") {
        return {
          ok: true,
          tool: tool.name,
          rows: [
            { id: "usr_001", email: "demo@example.com" },
            { id: "usr_002", email: "test@example.com" }
          ]
        };
      }

      return {
        ok: true,
        tool: tool.name,
        ticketId: "SUP-" + Math.floor(1000 + Math.random() * 9000),
        priority: args.priority,
        assignee: args.assignee || "unassigned"
      };
    }

    function buildRequest(tool, args) {
      return {
        jsonrpc: "2.0",
        id: String(Date.now() + Math.floor(Math.random() * 1000)),
        method: "tools/call",
        params: { name: tool.name, arguments: args }
      };
    }

    function createRunEntry(tool, args, started) {
      const validationError = validateArgs(tool, args);
      const request = buildRequest(tool, args);

      if (validationError) throw new Error(validationError);

      return {
        id: Date.now() + Math.floor(Math.random() * 1000),
        status: "ok",
        toolTitle: tool.title,
        toolName: tool.name,
        ms: Math.round(performance.now() - started),
        request,
        response: fakeCall(tool, args),
        error: null,
        time: new Date().toLocaleTimeString()
      };
    }

    function renderConnection() {
      $("dot").classList.toggle("on", state.connected);
      $("status").textContent = state.connected ? `已连接 · ${$("server").value}` : "未连接";
    }

    function renderTools() {
      const wrap = $("tools");
      wrap.innerHTML = "";

      if (!state.connected) {
        wrap.innerHTML = '<div class="empty">点击连接后，这里显示当前 server 的 tools。</div>';
        return;
      }

      for (const tool of sampleTools) {
        const item = document.createElement("button");
        item.className = `tool ${state.selected.name === tool.name ? "active" : ""}`;
        item.innerHTML = `
          <strong>${tool.title} <span style="font-weight:500;color:var(--muted)">${tool.name}</span></strong>
          <span>${tool.desc}</span>
          <span class="chips">${tool.tags.map(tag => `<span class="chip">${tag}</span>`).join("")}</span>
        `;
        item.addEventListener("click", () => {
          state.selected = tool;
          renderTools();
          renderSelectedTool(true);
        });
        wrap.appendChild(item);
      }
    }

    function renderSelectedTool(fillExample) {
      const tool = state.selected;
      $("toolName").textContent = `${tool.title} · ${tool.name}`;
      $("toolDesc").textContent = tool.desc;
      $("toolTag").textContent = tool.tags.join(" / ");
      $("schema").textContent = pretty(tool.schema);
      if (fillExample) $("argsInput").value = pretty(tool.example);
    }

    function renderResult() {
      const last = state.last;
      $("mCount").textContent = String(state.history.length);

      if (!last) {
        $("mStatus").textContent = "idle";
        $("mTime").textContent = "0 ms";
        $("output").textContent = "还没有运行。";
        return;
      }

      $("mStatus").textContent = last.status === "ok" ? "success" : "error";
      $("mTime").textContent = `${last.ms} ms`;

      if (state.tab === "response") $("output").textContent = last.response ? pretty(last.response) : "没有成功返回。";
      if (state.tab === "request") $("output").textContent = pretty(last.request);
      if (state.tab === "error") $("output").textContent = last.error ? pretty(last.error) : "没有错误。";
    }

    function renderHistory() {
      const wrap = $("history");
      wrap.innerHTML = "";

      if (!state.history.length) {
        wrap.innerHTML = '<div class="empty">运行一次 tool 后，这里会保存历史。</div>';
        return;
      }

      for (const row of state.history) {
        const div = document.createElement("div");
        div.className = "history-row";
        div.innerHTML = `
          <div class="line"><strong>${row.toolTitle}</strong><span class="pill ${row.status === "ok" ? "ok" : "err"}">${row.status}</span></div>
          <div class="line" style="color:var(--muted)"><span>${row.toolName}</span><span>${row.ms} ms · ${row.time}</span></div>
        `;
        div.addEventListener("click", () => {
          state.last = row;
          state.tab = "response";
          syncTabs();
          renderResult();
        });
        wrap.appendChild(div);
      }
    }

    function renderAutoResults() {
      const wrap = $("autoResults");
      wrap.innerHTML = "";

      const total = state.autoResults.length;
      const passed = state.autoResults.filter(row => row.status === "ok").length;
      const avg = total ? Math.round(state.autoResults.reduce((sum, row) => sum + row.ms, 0) / total) : 0;
      $("autoPassRate").textContent = total ? `${Math.round((passed / total) * 100)}%` : "0%";
      $("autoCount").textContent = `${passed} / ${total}`;
      $("autoAvg").textContent = `${avg} ms`;

      if (!total) {
        wrap.innerHTML = '<div class="empty">点击测试全部 tools 后，这里会生成自动测试报告。</div>';
        return;
      }

      for (const row of state.autoResults) {
        const div = document.createElement("div");
        div.className = "history-row";
        div.innerHTML = `
          <div class="line"><strong>${row.toolTitle}</strong><span class="pill ${row.status === "ok" ? "ok" : "err"}">${row.status}</span></div>
          <div class="line" style="color:var(--muted)"><span>${row.toolName}</span><span>${row.ms} ms · ${row.note}</span></div>
        `;
        div.addEventListener("click", () => {
          state.last = row;
          state.tab = row.status === "ok" ? "response" : "error";
          syncTabs();
          renderResult();
        });
        wrap.appendChild(div);
      }
    }

    function syncTabs() {
      document.querySelectorAll(".tabs button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === state.tab);
      });
    }

    async function runTool() {
      if (!state.connected) {
        toast("请先连接 server");
        return;
      }

      const started = performance.now();
      $("mStatus").textContent = "running";
      $("output").textContent = "运行中...";
      await new Promise(resolve => setTimeout(resolve, 320 + Math.random() * 420));

      let args;
      let request;
      let entry;

      try {
        args = JSON.parse($("argsInput").value);
        const validationError = validateArgs(state.selected, args);
        request = buildRequest(state.selected, args);

        if (validationError) throw new Error(validationError);

        entry = {
          id: Date.now(),
          status: "ok",
          toolTitle: state.selected.title,
          toolName: state.selected.name,
          ms: Math.round(performance.now() - started),
          request,
          response: fakeCall(state.selected, args),
          error: null,
          time: new Date().toLocaleTimeString()
        };
      } catch (error) {
        entry = {
          id: Date.now(),
          status: "err",
          toolTitle: state.selected.title,
          toolName: state.selected.name,
          ms: Math.round(performance.now() - started),
          request: request || { rawArguments: $("argsInput").value },
          response: null,
          error: { message: error.message, type: error.name || "Error" },
          time: new Date().toLocaleTimeString()
        };
      }

      state.last = entry;
      state.history = [entry, ...state.history].slice(0, 12);
      localStorage.setItem("mcpManualHistory", JSON.stringify(state.history));
      renderResult();
      renderHistory();
      toast(entry.status === "ok" ? "运行成功" : "运行失败");
    }

    $("connectBtn").addEventListener("click", () => {
      state.connected = true;
      renderConnection();
      renderTools();
      renderSelectedTool(true);
      toast("已连接演示 server");
    });

    $("disconnectBtn").addEventListener("click", () => {
      state.connected = false;
      renderConnection();
      renderTools();
      toast("已断开");
    });

    $("exampleBtn").addEventListener("click", () => {
      $("argsInput").value = pretty(state.selected.example);
      toast("已填入示例");
    });

    $("runBtn").addEventListener("click", runTool);

    $("autoRunBtn").addEventListener("click", async () => {
      if (!state.connected) {
        toast("请先连接 server");
        return;
      }

      $("autoRunBtn").disabled = true;
      $("autoRunBtn").textContent = "测试中...";
      state.autoResults = [];
      renderAutoResults();

      for (const tool of sampleTools) {
        const started = performance.now();
        await new Promise(resolve => setTimeout(resolve, 220 + Math.random() * 260));

        try {
          const entry = createRunEntry(tool, JSON.parse(JSON.stringify(tool.example)), started);
          entry.note = "基础参数通过";
          state.autoResults.push(entry);
        } catch (error) {
          state.autoResults.push({
            id: Date.now() + Math.floor(Math.random() * 1000),
            status: "err",
            toolTitle: tool.title,
            toolName: tool.name,
            ms: Math.round(performance.now() - started),
            request: buildRequest(tool, tool.example),
            response: null,
            error: { message: error.message, type: error.name || "Error" },
            note: "基础参数失败",
            time: new Date().toLocaleTimeString()
          });
        }

        renderAutoResults();
      }

      localStorage.setItem("mcpAutoResults", JSON.stringify(state.autoResults));
      $("autoRunBtn").disabled = false;
      $("autoRunBtn").textContent = "测试全部 tools";
      toast("自动测试完成");
    });

    $("clearBtn").addEventListener("click", () => {
      state.history = [];
      state.last = null;
      state.autoResults = [];
      localStorage.removeItem("mcpManualHistory");
      localStorage.removeItem("mcpAutoResults");
      renderHistory();
      renderAutoResults();
      renderResult();
      toast("历史已清空");
    });

    document.querySelectorAll(".tabs button").forEach(btn => {
      btn.addEventListener("click", () => {
        state.tab = btn.dataset.tab;
        syncTabs();
        renderResult();
      });
    });

    renderConnection();
    renderTools();
    renderSelectedTool(true);
    renderHistory();
    renderAutoResults();
    renderResult();
  </script>
</body>
</html>
