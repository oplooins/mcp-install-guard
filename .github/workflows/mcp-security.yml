name: MCP Security Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  mcp-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/mcp-install-guard
        with:
          file: ./examples/sample-tools-list.json
          policy: ./examples/policy.strict.json
          fail-on: policy
